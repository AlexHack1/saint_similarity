<!DOCTYPE html>
<html>
<head>
    <title>Saint Similarity Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        .node { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
        .link { stroke: #999; stroke-opacity: 0.3; }
        .label { font-size: 10px; pointer-events: none; fill: #ddd; }
        #controls { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="controls">
    <b>Saint Similarity Network</b><br>
    <input type="text" id="search" placeholder="Search for a saint..." style="margin-top:10px; padding:5px; width:100%;">
    <p style="font-size: 11px;">Scroll to Zoom | Click to visit Wiki</p>
    </div>
    <svg id="viz"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#viz")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => {
                container.attr("transform", event.transform);
            }));

        const container = svg.append("g");

        const color = d3.scaleOrdinal(d3.schemeCategory10); // Standard 10-color palette
        
        d3.json("saints_ui_data.json").then(graph => {
            const simulation = d3.forceSimulation(graph.nodes)
                .force("link", d3.forceLink(graph.links).id(d => d.id).distance(50))
                .force("charge", d3.forceManyBody().strength(-100))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = container.append("g")
                .selectAll("line")
                .data(graph.links)
                .join("line")
                .attr("class", "link");

//            const node = container.append("g")
//                .selectAll("circle")
//                .data(graph.nodes)
//                .join("circle")
//                .attr("class", "node")
//                .attr("r", 6)
//                .attr("fill", "#ffca28")
//                .on("click", (event, d) => { window.open(d.url, '_blank'); })
//                .call(d3.drag()
//                    .on("start", dragstarted)
//                    .on("drag", dragged)
//                    .on("end", dragended));

            const node = container.append("g")
                .selectAll("circle")
                .data(graph.nodes)
                .join("circle")
                .attr("class", "node")
                .attr("r", 7)
                .attr("fill", d => color(d.group)) // Uses the 'group' ID from Python
                .on("click", (event, d) => { window.open(d.url, '_blank'); });

                // 3. Add Search Functionality
            d3.select("#search").on("keyup", function(event) {
                const searchTerm = event.target.value.toLowerCase();
                
                // Highlight nodes that match search
                node.style("opacity", d => d.name.toLowerCase().includes(searchTerm) ? 1 : 0.1);
                label.style("opacity", d => d.name.toLowerCase().includes(searchTerm) ? 1 : 0.1);
                
                // Pulse the matched nodes
                node.attr("r", d => d.name.toLowerCase().includes(searchTerm) ? 12 : 7)
                    .style("stroke", d => d.name.toLowerCase().includes(searchTerm) ? "#fff" : "none")
                    .style("stroke-width", "3px");
            })
            const label = container.append("g")
                .selectAll("text")
                .data(graph.nodes)
                .join("text")
                .attr("class", "label")
                .text(d => d.name)
                .attr("dx", 12)
                .attr("dy", 4);

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                label.attr("x", d => d.x).attr("y", d => d.y);
            });

            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        });
    </script>
</body>
</html>
